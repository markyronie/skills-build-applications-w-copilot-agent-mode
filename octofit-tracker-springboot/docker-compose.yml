version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: octofit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: octofit_db
      POSTGRES_USER: octofit_user
      POSTGRES_PASSWORD: octofit_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octofit_user -d octofit_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
