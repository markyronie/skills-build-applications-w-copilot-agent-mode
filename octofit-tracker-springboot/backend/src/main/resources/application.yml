spring:
  application:
    name: octofit-tracker
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:octofit_db}
    username: ${DB_USERNAME:octofit_user}
    password: ${DB_PASSWORD:octofit_pass}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  security:
    user:
      name: admin
      password: admin

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:your-very-secure-secret-key-change-this-in-production-minimum-256-bits}
  expiration: 86400000  # 24 hours in milliseconds

cors:
  allowed-origins: http://localhost:3000,http://127.0.0.1:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

logging:
  level:
    com.octofit.tracker: DEBUG
    org.springframework.web: DEBUG
    org.hibernate: INFO
